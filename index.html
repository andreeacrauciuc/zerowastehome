<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/pwa-192x192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fdfbf7">
  <meta name="color-scheme" content="light">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ZeroWasteHome">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <title>ZeroWasteHome</title>
  <!-- Inline so the installed PWA never flashes a black/default background
       during the cold start before the JS/CSS bundle loads. -->
  <style>
    html { color-scheme: light; background-color: #fdfbf7; }
    body { margin: 0; background-color: #fdfbf7; }
    #app-splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #fdfbf7;
    }
    #app-splash .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid #d9d9d9;
      border-top-color: #355b3e;
      border-radius: 50%;
      animation: app-splash-spin 0.7s linear infinite;
    }
    @keyframes app-splash-spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <div id="root">
    <div id="app-splash"><div class="spinner"></div></div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
